<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Journal Papers — LIT @ KAIST</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="index.html"><span>LIT</span> @ KAIST</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <div class="dropdown">
          <a href="journal.html" class="drop-toggle active">Journal</a>
          <div class="dropdown-menu">
            <a href="journal.html#international">International</a>
            <a href="journal.html#domestic">Domestic</a>
          </div>
        </div>
        <div class="dropdown">
          <a href="conferences.html" class="drop-toggle">Conferences</a>
          <div class="dropdown-menu">
            <a href="conferences.html#international">International</a>
            <a href="conferences.html#domestic">Domestic</a>
          </div>
        </div>
        <div class="dropdown">
          <a href="patents.html" class="drop-toggle">Patents</a>
          <div class="dropdown-menu">
            <a href="patents.html#international">International</a>
            <a href="patents.html#domestic">Domestic</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="page-head">
      <h1>Journal Papers</h1>
      <div class="count"><span id="count">불러오는 중…</span></div>
    </div>
    <div id="tabs" class="tabs"></div>
    <div class="toolbar">
      <input id="search" class="search" type="search"
             placeholder="제목 · 저자 · 학술지 · 연도 검색…" autocomplete="off" />
    </div>
    <div id="list"></div>
  </main>

  <footer class="site-footer">
    <div class="wrap">© <span id="yr"></span> LIT Laboratory, KAIST.</div>
  </footer>

  <script src="assets/js/pubs.js"></script>
  <script>
    document.getElementById("yr").textContent = new Date().getFullYear();
    Pubs.initCategory({
      type: "journal",
      mount: "list",
      count: "count",
      search: "search",
      tabsEl: "tabs",
      sources: [
        { key: "international", label: "International", csv: "data/journal_international.csv" },
        { key: "domestic", label: "Domestic", csv: "data/journal_domestic.csv" },
      ],
      default: "international",
    });
  </script>
</body>
</html>
